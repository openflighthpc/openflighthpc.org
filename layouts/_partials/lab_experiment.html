<div class="lab-experiment">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <p><i>{{ .Description }}</i></p>
    <p>
        <span class="badge">Experiment Date:
            {{ .Date.Format "2006-01-02" }}
        </span>
        <span class="badge" >Status: 
            <span {{ if eq .Params.status "archived" }}class="status-archived"{{ else }}class="status"{{ end }}>{{ .Params.status }}</span>
        </span>
        <span class="badge" >
            <a href="{{ .Params.source }}">Source</a>
        </span>
    </p>
</div>
